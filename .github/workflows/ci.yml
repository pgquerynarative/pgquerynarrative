name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Prevent direct pushes to main (security best practice)
# This should be enforced via branch protection rules in GitHub settings

jobs:
  # Code quality checks
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum
      - name: Install dependencies
        run: go mod download
      - name: Generate code
        run: make generate
      - name: Run lint
        run: make lint
      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'make fmt'"
            gofmt -s -d .
            exit 1
          fi

  # Unit and integration tests
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum
      - name: Install dependencies
        run: go mod download
      - name: Generate code
        run: make generate
      - name: Run unit and integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: make test
      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        if: always()
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  # Build verification
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum
      - name: Install dependencies
        run: go mod download
      - name: Generate code
        run: make generate
      - name: Build
        run: make build
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: success()
        with:
          name: binary
          path: bin/server
          retention-days: 1
