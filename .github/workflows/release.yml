name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum
      - name: Install dependencies
        run: go mod download
      - name: Generate code
        run: make generate
      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then VER="${{ github.event.inputs.version }}"; else VER="${{ github.ref_name }}"; fi
          echo "VERSION=${VER#v}" >> $GITHUB_ENV
      - name: Build binaries
        run: |
          mkdir -p bin
          for pair in linux/amd64 darwin/amd64 darwin/arm64; do
            GOOS=${pair%%/*} GOARCH=${pair##*/} go build -ldflags "-X main.Version=$VERSION" -o bin/pgquerynarrative-server-${pair%%/*}-${pair##*/} ./cmd/server
            GOOS=${pair%%/*} GOARCH=${pair##*/} go build -ldflags "-X main.Version=$VERSION" -o bin/pgquerynarrative-mcp-${pair%%/*}-${pair##*/} ./cmd/mcp-server
          done
      - name: Create checksums
        run: |
          cd bin && sha256sum pgquerynarrative-* > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
