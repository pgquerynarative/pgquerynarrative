name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum
      - name: Install dependencies
        run: go mod download
      - name: Generate code
        run: make generate
      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/pgquerynarrative-linux-amd64 ./cmd/server
          GOOS=darwin GOARCH=amd64 go build -o bin/pgquerynarrative-darwin-amd64 ./cmd/server
          GOOS=darwin GOARCH=arm64 go build -o bin/pgquerynarrative-darwin-arm64 ./cmd/server
      - name: Create checksums
        run: |
          cd bin
          sha256sum * > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
