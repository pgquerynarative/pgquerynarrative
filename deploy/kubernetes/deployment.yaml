apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgquerynarrative
  namespace: pgquerynarrative
  labels:
    app.kubernetes.io/name: pgquerynarrative
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgquerynarrative
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgquerynarrative
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: app
          image: pgquerynarrative:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - NET_RAW
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: pgquerynarrative-config
            - secretRef:
                name: pgquerynarrative-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/queries/saved
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/v1/queries/saved
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir: {}
