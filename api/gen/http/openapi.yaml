swagger: "2.0"
info:
    title: PgQueryNarrative API
    description: Data Storyteller AI - Convert PostgreSQL SQL queries to business narratives
    version: v1
host: localhost:8080
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /api/v1/connections:
        get:
            tags:
                - connections
            summary: list connections
            description: List configured data connections (id and display name only)
            operationId: connections#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ConnectionListResult'
                        required:
                            - items
            schemes:
                - http
    /api/v1/dashboards:
        get:
            tags:
                - dashboards
            summary: list dashboards
            operationId: dashboards#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DashboardListResult'
                        required:
                            - items
            schemes:
                - http
        post:
            tags:
                - dashboards
            summary: create dashboards
            operationId: dashboards#create
            parameters:
                - name: CreateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/DashboardsCreateRequestBody'
                    required:
                        - name
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Dashboard'
                        required:
                            - id
                            - name
                            - widgets
                            - created_at
                            - updated_at
            schemes:
                - http
    /api/v1/dashboards/{id}:
        get:
            tags:
                - dashboards
            summary: get dashboards
            operationId: dashboards#get
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Dashboard'
                        required:
                            - id
                            - name
                            - widgets
                            - created_at
                            - updated_at
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
        put:
            tags:
                - dashboards
            summary: update dashboards
            operationId: dashboards#update
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
                - name: UpdateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/DashboardsUpdateRequestBody'
                    required:
                        - name
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Dashboard'
                        required:
                            - id
                            - name
                            - widgets
                            - created_at
                            - updated_at
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
        delete:
            tags:
                - dashboards
            summary: delete dashboards
            operationId: dashboards#delete
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "204":
                    description: No Content response.
            schemes:
                - http
    /api/v1/dashboards/{id}/resolve:
        get:
            tags:
                - dashboards
            summary: resolve dashboards
            operationId: dashboards#resolve
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DashboardResolved'
                        required:
                            - id
                            - name
                            - widgets
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/queries/run:
        post:
            tags:
                - queries
            summary: run queries
            description: Execute a SQL query and return results
            operationId: queries#run
            parameters:
                - name: RunRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/RunQueryPayload'
                    required:
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/RunQueryResult'
                        required:
                            - columns
                            - rows
                            - row_count
                            - execution_time_ms
                            - limit
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/queries/saved:
        get:
            tags:
                - queries
            summary: list_saved queries
            description: List saved queries
            operationId: queries#list_saved
            parameters:
                - name: tags
                  in: query
                  required: false
                  type: array
                  items:
                    type: string
                  collectionFormat: multi
                - name: connection_id
                  in: query
                  required: false
                  type: string
                - name: limit
                  in: query
                  required: false
                  type: integer
                  default: 50
                  maximum: 100
                  minimum: 1
                - name: offset
                  in: query
                  required: false
                  type: integer
                  default: 0
                  minimum: 0
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SavedQueryList'
                        required:
                            - items
                            - limit
                            - offset
            schemes:
                - http
        post:
            tags:
                - queries
            summary: save queries
            description: Save a query
            operationId: queries#save
            parameters:
                - name: SaveRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SaveQueryPayload'
                    required:
                        - name
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SavedQuery'
                        required:
                            - id
                            - name
                            - sql
                            - connection_id
                            - created_at
                            - updated_at
            schemes:
                - http
    /api/v1/queries/saved/{id}:
        get:
            tags:
                - queries
            summary: get_saved queries
            description: Get saved query by ID
            operationId: queries#get_saved
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SavedQuery'
                        required:
                            - id
                            - name
                            - sql
                            - connection_id
                            - created_at
                            - updated_at
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
        delete:
            tags:
                - queries
            summary: delete_saved queries
            description: Delete a saved query
            operationId: queries#delete_saved
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "204":
                    description: No Content response.
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports:
        get:
            tags:
                - reports
            summary: list reports
            description: List generated reports
            operationId: reports#list
            parameters:
                - name: saved_query_id
                  in: query
                  required: false
                  type: string
                  format: uuid
                - name: connection_id
                  in: query
                  required: false
                  type: string
                - name: limit
                  in: query
                  required: false
                  type: integer
                  default: 50
                  maximum: 100
                  minimum: 1
                - name: offset
                  in: query
                  required: false
                  type: integer
                  default: 0
                  minimum: 0
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ReportList'
                        required:
                            - items
                            - limit
                            - offset
            schemes:
                - http
    /api/v1/reports/{id}:
        get:
            tags:
                - reports
            summary: get reports
            description: Get a report by ID
            operationId: reports#get
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Report'
                        required:
                            - id
                            - sql
                            - connection_id
                            - narrative
                            - metrics
                            - created_at
                            - llm_model
                            - llm_provider
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports/generate:
        post:
            tags:
                - reports
            summary: generate reports
            description: Generate a narrative report from a SQL query
            operationId: reports#generate
            parameters:
                - name: GenerateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/GenerateReportPayload'
                    required:
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Report'
                        required:
                            - id
                            - sql
                            - connection_id
                            - narrative
                            - metrics
                            - created_at
                            - llm_model
                            - llm_provider
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports/rewrite:
        post:
            tags:
                - reports
            summary: rewrite reports
            description: Rewrite an existing report narrative using a user instruction.
            operationId: reports#rewrite
            parameters:
                - name: RewriteRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/ReportsRewriteRequestBody'
                    required:
                        - report_id
                        - instruction
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/NarrativeContent'
                        required:
                            - headline
                            - takeaways
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports/share:
        post:
            tags:
                - reports
            summary: create_share reports
            description: Create or refresh a shareable read-only token link for a report.
            operationId: reports#create_share
            parameters:
                - name: create_share_request_body
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/ReportsCreateShareRequestBody'
                    required:
                        - report_id
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ReportShareLink'
                        required:
                            - token
                            - url
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports/shared/{token}:
        get:
            tags:
                - reports
            summary: get_shared reports
            description: Fetch a report by valid share token.
            operationId: reports#get_shared
            parameters:
                - name: token
                  in: path
                  required: true
                  type: string
                  minLength: 12
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Report'
                        required:
                            - id
                            - sql
                            - connection_id
                            - narrative
                            - metrics
                            - created_at
                            - llm_model
                            - llm_provider
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports/similar:
        get:
            tags:
                - reports
            summary: similar reports
            description: Find reports semantically similar to input text
            operationId: reports#similar
            parameters:
                - name: text
                  in: query
                  required: true
                  type: string
                  maxLength: 2000
                  minLength: 1
                - name: connection_id
                  in: query
                  required: false
                  type: string
                - name: limit
                  in: query
                  required: false
                  type: integer
                  default: 5
                  maximum: 20
                  minimum: 1
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ReportSimilarResult'
                        required:
                            - items
            schemes:
                - http
    /api/v1/schedules:
        get:
            tags:
                - schedules
            summary: list schedules
            operationId: schedules#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ScheduleListResult'
                        required:
                            - items
            schemes:
                - http
        post:
            tags:
                - schedules
            summary: create schedules
            operationId: schedules#create
            parameters:
                - name: CreateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/ScheduleInput'
                    required:
                        - name
                        - cron_expr
                        - destination_type
                        - destination_target
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Schedule'
                        required:
                            - id
                            - name
                            - connection_id
                            - cron_expr
                            - destination_type
                            - destination_target
                            - enabled
                            - created_at
                            - updated_at
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/schedules/{id}:
        put:
            tags:
                - schedules
            summary: update schedules
            operationId: schedules#update
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
                - name: UpdateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SchedulesUpdateRequestBody'
                    required:
                        - name
                        - cron_expr
                        - destination_type
                        - destination_target
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Schedule'
                        required:
                            - id
                            - name
                            - connection_id
                            - cron_expr
                            - destination_type
                            - destination_target
                            - enabled
                            - created_at
                            - updated_at
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
        delete:
            tags:
                - schedules
            summary: delete schedules
            operationId: schedules#delete
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "204":
                    description: No Content response.
            schemes:
                - http
    /api/v1/schedules/{id}/run:
        post:
            tags:
                - schedules
            summary: run_now schedules
            operationId: schedules#run_now
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ScheduleRunResult'
                        required:
                            - schedule
                            - delivered
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/schema:
        get:
            tags:
                - schema
            summary: get schema
            description: Return the list of allowed schemas with their tables and columns (from information_schema, read-only).
            operationId: schema#get
            parameters:
                - name: connection_id
                  in: query
                  required: false
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SchemaResult'
                        required:
                            - schemas
            schemes:
                - http
    /api/v1/suggestions/ask:
        post:
            tags:
                - suggestions
            summary: ask suggestions
            description: 'Natural language to SQL and report in one step: ask a question, get a generated SELECT, run it, and return the narrative report. Requires LLM.'
            operationId: suggestions#ask
            parameters:
                - name: AskRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SuggestionsAskRequestBody'
                    required:
                        - question
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/AskResult'
                        required:
                            - question
                            - sql
                            - report
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/suggestions/chat:
        post:
            tags:
                - suggestions
            summary: chat suggestions
            description: Multi-turn Ask conversation with short context memory and optional follow-up suggestions.
            operationId: suggestions#chat
            parameters:
                - name: ChatRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SuggestionsChatRequestBody'
                    required:
                        - question
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ChatResult'
                        required:
                            - session_id
                            - question
                            - sql
                            - report
                            - history
                            - follow_ups
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/suggestions/explain:
        post:
            tags:
                - suggestions
            summary: explain suggestions
            description: Explain a SQL query in plain English (one or two sentences). Requires LLM.
            operationId: suggestions#explain
            parameters:
                - name: ExplainRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SuggestionsExplainRequestBody'
                    required:
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ExplainResult'
                        required:
                            - sql
                            - explanation
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/suggestions/queries:
        get:
            tags:
                - suggestions
            summary: queries suggestions
            description: 'Return suggested SQL queries: curated examples plus saved queries matching optional intent.'
            operationId: suggestions#queries
            parameters:
                - name: intent
                  in: query
                  description: Optional natural-language intent (e.g. 'sales by region'); used to match saved queries.
                  required: false
                  type: string
                - name: limit
                  in: query
                  description: Max number of suggestions to return
                  required: false
                  type: integer
                  default: 5
                  maximum: 20
                  minimum: 1
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SuggestedQueriesResult'
                        required:
                            - suggestions
            schemes:
                - http
    /api/v1/suggestions/questions:
        get:
            tags:
                - suggestions
            summary: questions suggestions
            description: Suggest natural-language questions based on the current schema for discovery and onboarding.
            operationId: suggestions#questions
            parameters:
                - name: connection_id
                  in: query
                  description: Optional connection ID; defaults to server default connection
                  required: false
                  type: string
                - name: limit
                  in: query
                  description: Max questions to return
                  required: false
                  type: integer
                  default: 8
                  maximum: 20
                  minimum: 1
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SuggestedQuestionsResult'
                        required:
                            - questions
            schemes:
                - http
    /api/v1/suggestions/similar:
        get:
            tags:
                - suggestions
            summary: similar suggestions
            description: Return saved queries semantically similar to the given text (embedding-based). Requires embeddings to be enabled.
            operationId: suggestions#similar
            parameters:
                - name: text
                  in: query
                  description: Natural-language or SQL text to find similar queries for.
                  required: false
                  type: string
                - name: limit
                  in: query
                  description: Max number of similar queries to return
                  required: false
                  type: integer
                  default: 5
                  maximum: 20
                  minimum: 1
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SuggestedQueriesResult'
                        required:
                            - suggestions
            schemes:
                - http
definitions:
    AggregateData:
        title: AggregateData
        type: object
        properties:
            avg:
                type: number
                example: 0.5831962354506013
                format: double
            count:
                type: integer
                example: 794358757
                format: int32
            max:
                type: number
                example: 0.9782589077097514
                format: double
            min:
                type: number
                example: 0.40544264752535336
                format: double
            std_dev:
                type: number
                description: Standard deviation (stats)
                example: 0.6018835501256113
                format: double
            sum:
                type: number
                example: 0.1524525738078653
                format: double
        example:
            avg: 0.05879240268591025
            count: 1620694259
            max: 0.8274806903862292
            min: 0.859665536373917
            std_dev: 0.5898864770481577
            sum: 0.9906853286351577
    AnomalyPointData:
        title: AnomalyPointData
        type: object
        properties:
            explanation:
                type: string
                description: One-sentence explanation for why this period may be anomalous
                example: Accusantium autem provident voluptate voluptatem.
            period_label:
                type: string
                example: Laudantium eveniet non recusandae autem perspiciatis.
            reason:
                type: string
                example: Modi sed eius a sed.
            value:
                type: number
                example: 0.4982683012412119
                format: double
        example:
            explanation: Minima esse ratione possimus aperiam.
            period_label: Sed eos est est sed dolorem sit.
            reason: Necessitatibus eum.
            value: 0.15295740759511167
        required:
            - period_label
            - value
            - reason
    AskResult:
        title: AskResult
        type: object
        properties:
            question:
                type: string
                description: The original natural-language question
                example: Reiciendis maiores.
            report:
                $ref: '#/definitions/Report'
            sql:
                type: string
                description: The generated and executed SQL
                example: Quasi amet culpa sapiente ipsam.
        example:
            question: Ut distinctio dolor quia.
            report:
                chart_suggestions:
                    - chart_type: Aperiam cumque eligendi aliquid voluptates esse occaecati.
                      label: Dicta sit doloribus occaecati provident voluptatem.
                      reason: Delectus perferendis.
                    - chart_type: Aperiam cumque eligendi aliquid voluptates esse occaecati.
                      label: Dicta sit doloribus occaecati provident voluptatem.
