swagger: "2.0"
info:
    title: PgQueryNarrative API
    description: Data Storyteller AI - Convert PostgreSQL SQL queries to business narratives
    version: v1
host: localhost:8080
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /api/v1/queries/run:
        post:
            tags:
                - queries
            summary: run queries
            description: Execute a SQL query and return results
            operationId: queries#run
            parameters:
                - name: RunRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/RunQueryPayload'
                    required:
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/RunQueryResult'
                        required:
                            - columns
                            - rows
                            - row_count
                            - execution_time_ms
                            - limit
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/queries/saved:
        get:
            tags:
                - queries
            summary: list_saved queries
            description: List saved queries
            operationId: queries#list_saved
            parameters:
                - name: tags
                  in: query
                  required: false
                  type: array
                  items:
                    type: string
                  collectionFormat: multi
                - name: limit
                  in: query
                  required: false
                  type: integer
                  default: 50
                  maximum: 100
                  minimum: 1
                - name: offset
                  in: query
                  required: false
                  type: integer
                  default: 0
                  minimum: 0
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SavedQueryList'
                        required:
                            - items
                            - limit
                            - offset
            schemes:
                - http
        post:
            tags:
                - queries
            summary: save queries
            description: Save a query
            operationId: queries#save
            parameters:
                - name: SaveRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SaveQueryPayload'
                    required:
                        - name
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SavedQuery'
                        required:
                            - id
                            - name
                            - sql
                            - created_at
                            - updated_at
            schemes:
                - http
    /api/v1/queries/saved/{id}:
        get:
            tags:
                - queries
            summary: get_saved queries
            description: Get saved query by ID
            operationId: queries#get_saved
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SavedQuery'
                        required:
                            - id
                            - name
                            - sql
                            - created_at
                            - updated_at
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
        delete:
            tags:
                - queries
            summary: delete_saved queries
            description: Delete a saved query
            operationId: queries#delete_saved
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "204":
                    description: No Content response.
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports:
        get:
            tags:
                - reports
            summary: list reports
            description: List generated reports
            operationId: reports#list
            parameters:
                - name: saved_query_id
                  in: query
                  required: false
                  type: string
                  format: uuid
                - name: limit
                  in: query
                  required: false
                  type: integer
                  default: 50
                  maximum: 100
                  minimum: 1
                - name: offset
                  in: query
                  required: false
                  type: integer
                  default: 0
                  minimum: 0
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ReportList'
                        required:
                            - items
                            - limit
                            - offset
            schemes:
                - http
    /api/v1/reports/{id}:
        get:
            tags:
                - reports
            summary: get reports
            description: Get a report by ID
            operationId: reports#get
            parameters:
                - name: id
                  in: path
                  required: true
                  type: string
                  format: uuid
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Report'
                        required:
                            - id
                            - sql
                            - narrative
                            - metrics
                            - created_at
                            - llm_model
                            - llm_provider
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NotFoundError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/reports/generate:
        post:
            tags:
                - reports
            summary: generate reports
            description: Generate a narrative report from a SQL query
            operationId: reports#generate
            parameters:
                - name: GenerateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/GenerateReportPayload'
                    required:
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Report'
                        required:
                            - id
                            - sql
                            - narrative
                            - metrics
                            - created_at
                            - llm_model
                            - llm_provider
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/schema:
        get:
            tags:
                - schema
            summary: get schema
            description: Return the list of allowed schemas with their tables and columns (from information_schema, read-only).
            operationId: schema#get
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SchemaResult'
                        required:
                            - schemas
            schemes:
                - http
    /api/v1/suggestions/ask:
        post:
            tags:
                - suggestions
            summary: ask suggestions
            description: 'Natural language to SQL and report in one step: ask a question, get a generated SELECT, run it, and return the narrative report. Requires LLM.'
            operationId: suggestions#ask
            parameters:
                - name: AskRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SuggestionsAskRequestBody'
                    required:
                        - question
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/AskResult'
                        required:
                            - question
                            - sql
                            - report
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/suggestions/explain:
        post:
            tags:
                - suggestions
            summary: explain suggestions
            description: Explain a SQL query in plain English (one or two sentences). Requires LLM.
            operationId: suggestions#explain
            parameters:
                - name: ExplainRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/SuggestionsExplainRequestBody'
                    required:
                        - sql
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ExplainResult'
                        required:
                            - sql
                            - explanation
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/ValidationError'
                        required:
                            - name
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/LLMError'
                        required:
                            - name
                            - message
            schemes:
                - http
    /api/v1/suggestions/queries:
        get:
            tags:
                - suggestions
            summary: queries suggestions
            description: 'Return suggested SQL queries: curated examples plus saved queries matching optional intent.'
            operationId: suggestions#queries
            parameters:
                - name: intent
                  in: query
                  description: Optional natural-language intent (e.g. 'sales by region'); used to match saved queries.
                  required: false
                  type: string
                - name: limit
                  in: query
                  description: Max number of suggestions to return
                  required: false
                  type: integer
                  default: 5
                  maximum: 20
                  minimum: 1
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SuggestedQueriesResult'
                        required:
                            - suggestions
            schemes:
                - http
    /api/v1/suggestions/similar:
        get:
            tags:
                - suggestions
            summary: similar suggestions
            description: Return saved queries semantically similar to the given text (embedding-based). Requires embeddings to be enabled.
            operationId: suggestions#similar
            parameters:
                - name: text
                  in: query
                  description: Natural-language or SQL text to find similar queries for.
                  required: false
                  type: string
                - name: limit
                  in: query
                  description: Max number of similar queries to return
                  required: false
                  type: integer
                  default: 5
                  maximum: 20
                  minimum: 1
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/SuggestedQueriesResult'
                        required:
                            - suggestions
            schemes:
                - http
